services:
  - type: web
    name: axisx-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: axisx
      - key: CORS_ORIGINS
        value: https://axisx-frontend.onrender.com,http://localhost:5173

  - type: web
    name: axisx-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://axisx-backend.onrender.com/api/v1
